<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>¡Reserva recibida! | La Fábrica de Sonrisas</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #FDFAF6; color: #2D1F52; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .card { background: #fff; border-radius: 32px; padding: 4rem 3rem; text-align: center; max-width: 480px; box-shadow: 0 24px 64px rgba(109,40,217,.12); }
    .emoji { font-size: 4rem; margin-bottom: 1.5rem; display: block; animation: bounce .8s ease infinite alternate; }
    @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-12px); } }
    h1 { font-family: 'Fraunces', serif; font-size: 2rem; color: #1C1435; margin-bottom: 1rem; }
    p { color: #6B5F8A; line-height: 1.7; margin-bottom: 2rem; }
    a { display: inline-block; background: #6D28D9; color: #fff; padding: .85rem 2rem; border-radius: 50px; text-decoration: none; font-weight: 600; transition: background .2s; }
    a:hover { background: #4C1D95; }
  </style>
</head>
<body>
  <div class="card">
    <span class="emoji">🎉</span>
    <h1>¡Reserva recibida!</h1>
    <p>Sonia se pondrá en contacto contigo en menos de 24 horas para confirmar todos los detalles de la celebración.</p>
    <a href="/">Volver al inicio</a>
  </div>
</body>
</html>
